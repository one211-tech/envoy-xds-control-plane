# xDS Control Plane Configuration
# HOCON (Human-Optimized Config Object Notation) format

# Server Configuration
server {
  grpc {
    port = 18000
    host = "0.0.0.0"
  }
  http {
    port = 18001
    host = "0.0.0.0"
  }
}

# xDS Configuration
xds {
  # Gateway ports
  https-gateway-port = 443
  minio-s3-api-port = 19000

  # Arrow Flight SQL ports (exposed on Envoy)
  flight-ports {
    controller1 = 59307
    controller2 = 59301
    ollylake = 59305
  }

  # PostgreSQL ports (exposed on Envoy)
  postgres-ports {
    backend = 15432
    cluster = 15433
  }

  # Service ports (internal container ports)
  services {
    backend = 8080
    frontend = 5173
    minio-api = 9000
    minio-console = 9001
    ollylake-http = 8081
    controller1-http = 9006
    controller2-http = 9007
    controller1-flight = 59307
    controller2-flight = 59301
    ollylake-flight = 59305
    database = 5432
  }

  # Service hostnames (Docker service names)
  hosts {
    backend = "application-backend"
    frontend = "frontend"
    minio = "minio"
    ollylake = "ollylake"
    controller1 = "sql-controller1"
    controller2 = "sql-controller2"
    backend-database = "backend-database"
    cluster-database = "org1-cluster1-postgres"
  }

  # TLS certificate paths (on the Envoy container)
  tls {
    cert-chain = "/etc/envoy/certs/fullchain.pem"
    private-key = "/etc/envoy/certs/privkey.pem"
  }

  # CORS configuration
  cors {
    allowed-origin = "https://dazzleduck-ui.netlify.app"
  }

  # Timeouts (in seconds)
  timeouts {
    # HTTP/API timeouts
    api-short = 30
    api-standard = 60
    api-long = 300

    # TCP connection timeouts
    tcp-connect = 10
    tcp-idle = 3600

    # Immediate timeout (for websocket connections)
    immediate = 0
  }

  # Scheduler configuration
  scheduler {
    initial-delay-sec = 10
    interval-sec = 10
  }
}

# Authentication Configuration
authentication {
  # Enable/disable authentication
  enabled = true

  # JWT Configuration
  jwt {
    # Secret key for signing JWT tokens (min 256 bits for HS256)
    # In production, override this with environment variable: JWT_SECRET_KEY
    secret-key = """xds-control-plane-dev-jwt-secret-2026-rotate-this-for-production-use-9f7c3b1a5d8e2k4m"""

    # Token expiration time in milliseconds (24 hours)
    expiration-ms = 86400000

    # Token issuer
    issuer = "xds-control-plane"

    # Token audience
    audience = "xds-api"
  }

  # Demo Users Configuration
  # These users are loaded from config. In production, use database/LDAP.
  users {
    # Administrator user
    admin {
      password = "admin123"
      role = "ADMIN"
      enabled = true
    }

    # Demo operator user
    operator {
      password = "operator123"
      role = "OPERATOR"
      enabled = true
    }

    # Demo viewer user (read-only access)
    viewer {
      password = "viewer123"
      role = "VIEWER"
      enabled = true
    }

    # Demo service account (for automated tasks)
    service-account {
      password = "service-secret"
      role = "SERVICE"
      enabled = true
    }
  }

  # Role Permissions Configuration
  roles {
    ADMIN {
      permissions = [
        "reload",
        "add-cluster",
        "update-endpoints",
        "delete-cluster",
        "manage-users",
        "view-logs"
      ]
      description = "Full administrative access"
    }

    OPERATOR {
      permissions = [
        "reload",
        "add-cluster",
        "update-endpoints",
        "view-logs"
      ]
      description = "Operational access (no user management)"
    }

    VIEWER {
      permissions = [
        "view-logs",
        "health-check"
      ]
      description = "Read-only access"
    }

    SERVICE {
      permissions = [
        "add-cluster",
        "update-endpoints"
      ]
      description = "Service account for automated tasks"
    }
  }
}

# Cache Configuration
cache {
  # Node ID for xDS — must match the node.id in envoy.yaml
  node-id = "envoy-gateway"

  # Refresh interval in seconds
  refresh-interval-sec = 10
}

# Logging Configuration
logging {
  level = "INFO"
  format = "json"
}

# Demo Settings
demo {
  enabled = false

  default-clusters = [
    {
      name = "demo-cluster-1"
      endpoints = ["localhost:8080", "localhost:8081"]
    }
    {
      name = "demo-cluster-2"
      endpoints = ["localhost:9000", "localhost:9001"]
    }
  ]
}
